name: Publish to npm

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.1
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name || github.ref_name }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_VERSION="${RELEASE_TAG#v}"
          if [ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Package smoke test
        run: npm pack --dry-run

      - name: Publish
        run: npm publish
